
services:

  coordinator:
    image: citusdata/citus:11.2
    container_name: coordinator
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "9000:5432"
    networks:
      - ecommerce_net

  coordinator_backup:
    image: citusdata/citus:11.2
    container_name: coordinator_backup
    environment:
      POSTGRES_PASSWORD: postgres
    ports:
      - "9002:5432"
    networks:
      - ecommerce_net

  worker1:
    image: citusdata/citus:11.2
    container_name: worker1
    environment:
      POSTGRES_PASSWORD: postgres
    networks:
      - ecommerce_net

  worker2:
    image: citusdata/citus:11.2
    container_name: worker2
    environment:
      POSTGRES_PASSWORD: postgres
    networks:
      - ecommerce_net

  worker3:
    image: citusdata/citus:11.2
    container_name: worker3
    environment:
      POSTGRES_PASSWORD: postgres
    networks:
      - ecommerce_net

  worker4:
    image: citusdata/citus:11.2
    container_name: worker4
    environment:
      POSTGRES_PASSWORD: postgres
    networks:
      - ecommerce_net

  haproxy:
    image: haproxy:2.9
    container_name: haproxy
    ports:
      - "9001:5432"
      - "8404:8404"
    volumes:
      - ./haproxy/haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg:ro
    depends_on:
      - coordinator
      - coordinator_backup
    networks:
      - ecommerce_net

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "9005:80"
    networks:
      - ecommerce_net

  backend:
    container_name: backend
    image: back_end:3.9.4
    ports:
      - "${PORT:-3000}:3000"
    environment:
      PORT: 3000
      DB_HOST: haproxy
      DB_PORT: 5432
      DB_NAME: postgres
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_SCHEMA: public
      DEFAULT_LIMIT: 100
      MAX_LIMIT: 1000
    depends_on:
      - haproxy
    networks:
      - ecommerce_net

  frontend:
    container_name: frontend
    image: front_mirage:3.5
    ports:
      - "9009:80"
    environment:
      VITE_API_URL: http://localhost:3000
    depends_on:
      - backend
    networks:
      - ecommerce_net

networks:
  ecommerce_net:
    external: true
    name: ecommerce_net

